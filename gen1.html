<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI.FAVICON.LAB</title>
    <style>
        /* --- 1. GLOBAL INDIE/HIPSTER STYLING --- */
        body { 
            background-color: #050505; 
            color: #fafafa; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* --- 2. THE LAB CONTAINER --- */
        .lab-container { 
            background: #111; 
            padding: 30px; 
            border: 1px solid #333; 
            text-align: center; 
            border-radius: 4px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8); 
            width: 340px;
            position: relative;
        }

        /* Geometric Accent Line */
        .lab-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, #ff007f, #9f00ff);
        }

        h1 { 
            font-size: 1.1rem; 
            letter-spacing: 4px; 
            color: #ff007f; 
            margin-bottom: 20px; 
            text-shadow: 0 0 10px rgba(255,0,127,0.3);
        }
        
        /* --- 3. INPUT BOX --- */
        input { 
            background: #000; 
            border: 1px solid #9f00ff; 
            color: #fafafa; 
            padding: 12px; 
            font-family: inherit; 
            width: 100%; 
            text-align: center; 
            margin-bottom: 25px; 
            box-sizing: border-box; 
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: #ff007f; box-shadow: 0 0 15px rgba(255,0,127,0.2); }
        
        /* --- 4. IMAGE PREVIEWS (CENTERING FIXES) --- */
        .mini-view, .large-view {
            display: flex;           /* Centers the content inside */
            justify-content: center;
            align-items: center;
            margin: 0 auto;          /* Centers the box itself */
            border: 1px solid #444; 
            background: #000;
            overflow: hidden;
        }

        .mini-view { 
            width: 30px; 
            height: 30px; 
            margin-bottom: 15px; 
        }

        .large-view { 
            width: 200px; 
            height: 200px; 
            margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(159,0,255,0.2);
        }
        
        /* Ensures the AI image fills the squares perfectly */
        .mini-view img, .large-view img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            flex-shrink: 0;
        }

        /* --- 5. BUTTON & LABELS --- */
        .gen-button { 
            background: #ff007f; 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            font-family: inherit; 
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
        }
        .gen-button:hover { background: #9f00ff; box-shadow: 0 0 15px #9f00ff; }
        .gen-button:active { transform: scale(0.98); }

        .label { 
            font-size: 0.6rem; 
            opacity: 0.4; 
            letter-spacing: 2px; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
        }
    </style>
</head>
<body>

    <div class="lab-container">
        <h1>_AI.FAVICON.LAB</h1>
        
        <p class="label">// INPUT_VIBE</p>
        <input type="text" placeholder="e.g. neon lavender" id="vibeInput">
        
        <div>
            <p class="label">TAB_PREVIEW [30x30]</p>
            <div class="mini-view" id="miniView">
                <span style="font-size: 8px; color: #333;">[IMG]</span>
            </div>
        </div>

        <div>
            <p class="label">WORKSPACE [AUTO_SCALE]</p>
            <div class="large-view" id="largeView">
                <span style="font-size: 10px; color: #333;">[PREVIEW_AREA]</span>
            </div>
        </div>

        <div class="controls">
            <button class="gen-button" onclick="update()">RUN_GENERATION</button>
            <p class="label" style="margin-top:12px;">// SYSTEM_STATUS: ONLINE</p>
        </div>
    </div>

    <script>
        let aiPrompt = "";

        // Hook up the input
        document.getElementById('vibeInput').addEventListener('input', function(e) {
            aiPrompt = e.target.value;
        });
        async function update() {
    const prompt = document.getElementById('vibeInput').value || "vaporwave aesthetic favicon";
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const loaders = document.querySelectorAll('.loading-text');
    const images = document.querySelectorAll('img');

    // YOUR API KEY (Replace this!)
    const HF_TOKEN = "your_huggingface_token_here"; 

    // UI Setup
    btn.disabled = true;
    btn.innerText = "GENERATING...";
    status.innerText = "// SYSTEM_STATUS: COMMUNICATING_WITH_API";
    images.forEach(img => img.style.display = 'none');
    loaders.forEach(l => l.style.display = 'block');

    try {
        const response = await fetch(
            "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-3.5-large",
            {
                headers: { Authorization: `Bearer ${HF_TOKEN}` },
                method: "POST",
                body: JSON.stringify({ inputs: prompt }),
            }
        );

        if (!response.ok) throw new Error("API Limit reached or Model Loading");

        const blob = await response.blob();
        const imageUrl = URL.createObjectURL(blob);

        // Update both previews
        images.forEach(img => {
            img.src = imageUrl;
            img.onload = () => {
                img.style.display = 'block';
                loaders.forEach(l => l.style.display = 'none');
            };
        });

        btn.disabled = false;
        btn.innerText = "RUN_GENERATION";
        status.innerText = "// SYSTEM_STATUS: ONLINE";

    } catch (error) {
        console.error(error);
        status.innerText = "// ERROR: MODEL_INITIALIZING_TRY_AGAIN";
        btn.disabled = false;
        btn.innerText = "RETRY_GENERATION";
    }
}
    </script>

</body>
</html>
